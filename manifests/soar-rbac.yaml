apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: soar-eviction-role
  namespace: production
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: soar-eviction-binding
  namespace: production
subjects:
- kind: ServiceAccount
  name: soar-responder-sa
  namespace: monitoring
roleRef:
  kind: Role
  name: soar-eviction-role
  apiGroup: rbac.authorization.k8s.io
